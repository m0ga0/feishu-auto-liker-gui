name: Build Linux App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        python -m playwright install chromium
        python -m playwright install-deps chromium

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "飞书自动点赞助手-Linux"             --onefile             --windowed             --hidden-import customtkinter             --hidden-import playwright             --hidden-import yaml             --hidden-import loguru             --add-data "config.example.yaml:."             main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FeishuAutoLiker-Linux
        path: dist/飞书自动点赞助手-Linux
        retention-days: 90
