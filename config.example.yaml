# Feishu Auto-Liker GUI Configuration
# This file is automatically generated and updated by the application.

monitor:
  # Keywords to match (supports simple text and regex with "re:" prefix)
  patterns:
    - 打卡
    - 签到
    # - "re:.*紧急.*"

  # Emoji to react with (must match Feishu's emoji names)
  # Common: 赞, 爱心, 鼓掌, 微笑, 大笑, 感谢, 玫瑰, 加油
  reaction_emoji: 赞

  # Specific group names to monitor (leave empty to monitor current active chat)
  # Use exact group names as shown in Feishu
  monitored_groups: []

  # Check interval in seconds (lower = faster but more detectable)
  # Recommended: 1-3 seconds
  check_interval: 2.0

  # Maximum messages to process per check (prevents overload)
  max_messages_per_check: 10

# Notification settings
notification:
  # System notification (desktop popup)
  desktop_notification: true

  # Send notification message to self-chat
  # Set to your own name or leave empty to disable
  self_chat_notify: false

# Anti-detection settings
anti_detect:
  # Random delay range (seconds) added after each action
  min_delay: 0.5
  max_delay: 2.0

  # Random delay before clicking reaction (simulate human thinking)
  reaction_delay_min: 0.3
  reaction_delay_max: 1.5

# Browser settings
browser:
  # Path to persistent user data directory (stores login session)
  user_data_dir: "./feishu_browser_data"

  # Window size
  width: 1280
  height: 800

  # Run in headless mode (NOT recommended for Feishu - may trigger detection)
  headless: false

# Logging
log:
  level: INFO
  file: "rpa_bot.log"
